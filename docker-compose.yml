services:
  postgres:
    image: postgres:16
    container_name: orderflow_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orderflow
    ports:
      - "5432:5432"
    volumes:
      - orderflow_postgres_data:/var/lib/postgresql/data

volumes:
  orderflow_postgres_data:
